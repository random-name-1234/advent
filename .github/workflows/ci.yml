name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore advent.sln

      - name: Build
        run: dotnet build advent.sln -c Release --no-restore

      - name: Validate Assets
        run: ./scripts/validate-assets.sh --no-build --no-restore --verbosity normal

      - name: Test
        run: dotnet test advent.Tests/advent.Tests.csproj -c Release --no-build --verbosity normal
