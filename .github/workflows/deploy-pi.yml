name: Deploy Pi

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: false
        default: main
      led_args:
        description: LED runtime args passed to advent
        required: false
        default: --led-gpio-mapping=adafruit-hat-pwm --led-slowdown-gpio=4
  push:
    branches:
      - main

concurrency:
  group: deploy-pi
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - arm64
      - advent

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Deploy on Pi
        run: ./scripts/deploy-on-pi.sh
        env:
          LED_ARGS: ${{ github.event.inputs.led_args || vars.ADVENT_LED_ARGS || '--led-gpio-mapping=adafruit-hat-pwm --led-slowdown-gpio=4' }}
          ADVENT_SERVICE_UNIT: ${{ vars.ADVENT_SERVICE_UNIT || 'advent.service' }}
          ADVENT_STABLE_APP_DIR: ${{ vars.ADVENT_STABLE_APP_DIR || '/home/pi/advent-app' }}
          ADVENT_STABLE_SRC_DIR: ${{ vars.ADVENT_STABLE_SRC_DIR || '/home/pi/advent-src' }}
          ADVENT_NEXT_APP_DIR: ${{ vars.ADVENT_NEXT_APP_DIR || '/home/pi/advent-next-app' }}
          ADVENT_NEXT_SRC_DIR: ${{ vars.ADVENT_NEXT_SRC_DIR || '/home/pi/advent-next-src' }}
