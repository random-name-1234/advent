name: Deploy Pi

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: false
        default: main
      led_args:
        description: LED runtime args passed to advent
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-pi
  cancel-in-progress: false

jobs:
  deploy:
    timeout-minutes: 20
    runs-on:
      - self-hosted
      - linux
      - arm64
      - advent
    environment:
      name: advent-pi

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Deploy on Pi
        run: ./scripts/deploy-on-pi.sh
        env:
          LED_ARGS: ${{ inputs.led_args != '' && inputs.led_args || vars.ADVENT_LED_ARGS || '--led-gpio-mapping=adafruit-hat-pwm --led-slowdown-gpio=4' }}
          ADVENT_SERVICE_UNIT: ${{ vars.ADVENT_SERVICE_UNIT }}
          ADVENT_SERVICE_USER: ${{ vars.ADVENT_SERVICE_USER }}
          ADVENT_SERVICE_GROUP: ${{ vars.ADVENT_SERVICE_GROUP }}
          ADVENT_SERVICE_SUPPLEMENTARY_GROUPS: ${{ vars.ADVENT_SERVICE_SUPPLEMENTARY_GROUPS }}
          ADVENT_ENV_FILE: ${{ vars.ADVENT_ENV_FILE }}
          ADVENT_STABLE_APP_DIR: ${{ vars.ADVENT_STABLE_APP_DIR }}
          ADVENT_STABLE_SRC_DIR: ${{ vars.ADVENT_STABLE_SRC_DIR }}
          ADVENT_NEXT_APP_DIR: ${{ vars.ADVENT_NEXT_APP_DIR }}
          ADVENT_NEXT_SRC_DIR: ${{ vars.ADVENT_NEXT_SRC_DIR }}
